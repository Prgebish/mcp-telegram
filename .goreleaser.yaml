version: 2

builds:
  - main: ./cmd/mcp-telegram
    binary: mcp-telegram
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# brews:
#   - repository:
#       owner: Prgebish
#       name: homebrew-tap
#     homepage: https://github.com/Prgebish/mcp-telegram
#     description: "MCP server for Telegram — connect Claude to your real Telegram account"
#     license: MIT
#   Note: requires a PAT with repo scope in GITHUB_TOKEN to push to homebrew-tap

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
